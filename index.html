<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobrevivência Zen - Universo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            pointer-events: none; user-select: none; z-index: 10;
        }
        .bar-container { width: 250px; height: 20px; background: rgba(255,255,255,0.2); border: 2px solid #fff; margin-bottom: 5px; border-radius: 10px; overflow: hidden;}
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0044, #ff6600); transition: width 0.2s; }
        .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .skill { padding: 5px 10px; border: 1px solid #555; background: rgba(0,0,0,0.7); font-size: 12px; font-weight: bold; text-align: center; border-radius: 5px; color: #888;}
        .ready { border-color: #00d2ff; color: #00d2ff; box-shadow: 0 0 5px rgba(0, 210, 255, 0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="bar-container"><div id="hp-bar"></div></div>
        <div id="hp-text" style="font-weight: bold; margin-bottom: 10px;">HP: 100 / 100</div>
        
        <div class="skills-grid">
            <div id="skill1" class="skill">Q - TIRO (0.5s)</div>
            <div id="skill2" class="skill">E - EXPLOSÃO (5s)</div>
            <div id="skill3" class="skill">ESPAÇO - DASH (3s)</div>
            <div id="skill4" class="skill">SHIFT - ESCUDO (10s)</div>
            <div id="skill5" class="skill" style="grid-column: span 2;">F - BURACO NEGRO (15s)</div>
        </div>
        
        <div id="score" style="font-size: 24px; margin-top: 15px; font-weight: bold; color: #ffdd00;">Kills: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="cenario.js"></script>
    <script src="script.js"></script>
</body>
</html>
