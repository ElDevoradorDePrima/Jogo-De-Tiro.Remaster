<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobrevivência Zen - Overdrive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010103; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; user-select: none; z-index: 10; }
        
        .bar-container { width: 300px; height: 25px; background: rgba(0,0,0,0.6); border: 2px solid #222; margin-bottom: 5px; border-radius: 15px; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.9); }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0044, #ff0055, #ffaa00); transition: width 0.2s; }
        #hp-text { font-weight: 900; font-size: 16px; margin-bottom: 10px; text-shadow: 1px 1px 3px black; letter-spacing: 1px;}
        
        .xp-container { width: 300px; height: 12px; background: rgba(0,0,0,0.6); border: 1px solid #444; margin-bottom: 5px; border-radius: 6px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffaa, #00d2ff); transition: width 0.3s; box-shadow: 0 0 10px #00ffaa; }
        #nivel-text { font-size: 15px; color: #00ffaa; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 8px #00ffaa; }

        .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; width: 380px; }
        .skill { padding: 6px 5px; border: 2px solid #222; background: rgba(0,0,0,0.8); font-size: 10px; font-weight: bold; text-align: center; border-radius: 6px; color: #555; transition: all 0.3s ease; }
        
        .ready { border-color: #00d2ff; color: #fff; text-shadow: 0 0 5px #00d2ff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.4), inset 0 0 5px rgba(0, 210, 255, 0.2); }
        .ready.ult { border-color: #ff00ea; color: #fff; text-shadow: 0 0 5px #ff00ea; box-shadow: 0 0 10px rgba(255, 0, 234, 0.4); }
        .ready.time { border-color: #00ffaa; color: #fff; text-shadow: 0 0 5px #00ffaa; box-shadow: 0 0 10px rgba(0, 255, 170, 0.4); }
        .ready.storm { border-color: #ff5500; color: #fff; text-shadow: 0 0 5px #ff5500; box-shadow: 0 0 10px rgba(255, 85, 0, 0.4); }
        .ready.tech { border-color: #ffff00; color: #fff; text-shadow: 0 0 5px #ffff00; box-shadow: 0 0 10px rgba(255, 255, 0, 0.4); }

        .locked { border-color: #ff000033 !important; color: #444 !important; background: repeating-linear-gradient(45deg, rgba(0,0,0,0.8), rgba(0,0,0,0.8) 10px, rgba(255,0,0,0.1) 10px, rgba(255,0,0,0.1) 20px) !important; text-decoration: line-through; opacity: 0.7; }

        #score-container { margin-top: 25px; display: flex; flex-direction: column; }
        #score { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        #combo-text { font-size: 24px; font-weight: 900; color: #ffdd00; text-shadow: 0 0 15px rgba(255, 221, 0, 0.8); transition: transform 0.1s; }
        .frenzy { color: #ff3300 !important; text-shadow: 0 0 20px #ff0000, 0 0 30px #ffaa00 !important; transform: scale(1.1); animation: shake 0.2s infinite; }
        
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg) scale(1.1); } 50% { transform: translate(-1px, -2px) rotate(-1deg) scale(1.1); } 100% { transform: translate(-2px, 1px) rotate(1deg) scale(1.1); } }
    </style>
</head>
<body>
    <div id="ui">
        <div class="bar-container"><div id="hp-bar"></div></div>
        <div id="hp-text">INTEGRIDADE DO NÚCLEO: 100%</div>
        
        <div id="nivel-text">NÍVEL: 1</div>
        <div class="xp-container"><div id="xp-bar"></div></div>
        
        <div class="skills-grid">
            <div id="skill-q" class="skill">Q - TIRO</div>
            <div id="skill-space" class="skill">ESPAÇO - DASH</div>
            <div id="skill-e" class="skill locked">E - EXPLOSÃO [LVL 2]</div>
            <div id="skill-shift" class="skill locked">SHIFT - ESCUDO [LVL 3]</div>
            <div id="skill-f" class="skill ult locked">F - RAIO ORBITAL [LVL 4]</div> 
            <div id="skill-t" class="skill storm locked">T - VORTEX [LVL 5]</div>
            <div id="skill-g" class="skill ult locked">G - BURACO NEGRO [LVL 6]</div> 
            <div id="skill-c" class="skill time locked">C - CHRONOS [LVL 7]</div>
            <div id="skill-z" class="skill tech locked">Z - LÂMINA LASER [LVL 8]</div>
            <div id="skill-x" class="skill tech locked">X - MÍSSIL TELEG. [LVL 9]</div>
        </div>
        
        <div id="score-container">
            <div id="score">Kills: 0</div>
            <div id="combo-text">Combo: x0</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="cenario.js"></script>
    <script src="nivel.js"></script>
    <script src="script.js"></script>
    <script src="adm.js"></script> 
</body>
</html>
